<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — DealAlerts</title>
    <link rel="stylesheet" href="/webpage/styles/styles.css" />
    <style>
      .name-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .terms-note {
        text-align: center;
        font-size: 0.75rem;
        color: var(--muted-foreground);
        line-height: 1.5;
      }

      .terms-note a {
        color: var(--primary);
        text-decoration: none;
      }

      .terms-note a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <a href="/" class="logo">
        <svg
          class="logo-icon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
          <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
        </svg>
        <span class="logo-text">DealAlerts</span>
      </a>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Create Your Account</h2>
          <p class="card-description">Start tracking deals in minutes</p>
        </div>

        <div class="card-content">
          <form class="form" onsubmit="handleSubmit(event)" novalidate>
            <div class="name-grid">
              <div class="field">
                <label for="firstName">First Name</label>
                <input
                  id="firstName"
                  type="text"
                  placeholder="John"
                  required
                  autocomplete="given-name"
                />
              </div>
              <div class="field">
                <label for="lastName">Last Name</label>
                <input
                  id="lastName"
                  type="text"
                  placeholder="Doe"
                  required
                  autocomplete="family-name"
                />
              </div>
            </div>

            <div class="field">
              <label for="email">Email</label>
              <input
                id="email"
                type="email"
                placeholder="you@example.com"
                required
                autocomplete="email"
              />
            </div>

            <div class="field">
              <label for="password">Password</label>
              <input
                id="password"
                type="password"
                placeholder="••••••••"
                required
                autocomplete="new-password"
              />
            </div>

            <div class="field">
              <label for="confirmPassword">Confirm Password</label>
              <input
                id="confirmPassword"
                type="password"
                placeholder="••••••••"
                required
                autocomplete="new-password"
              />
            </div>

            <button type="submit" class="btn-primary">Create Account</button>

            <p class="terms-note">
              By creating an account, you agree to our
              <a href="#terms">Terms of Service</a>
              and
              <a href="#privacy">Privacy Policy</a>
            </p>

            <p class="signup-prompt">
              Already have an account?
              <a href="/login">Login</a>
            </p>
          </form>
        </div>
      </div>
    </div>

    <script>
      function handleSubmit(e) {
        e.preventDefault();
        window.location.href = "/onboarding";
      }
    </script>
  </body>
</html>
